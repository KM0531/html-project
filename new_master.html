<!-- ★マスタ一覧画面★ START -->
<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <title>マスタ一覧画面</title>
    <!-- ファビコン -->
    <link rel="icon" href="icons/MHC_favicon.png" />
    <style>
      :root {
        --blue: #0078d4;
        --blue-dark: #106ebe;
        --sp-blue: #0078d4;
        --line: #e1dfdd;
        --bg: #f3f2f1;
        --panel: #ffffff;
        --text: #323130;
        --muted: #605e5c;

        --danger: #d13438;
        --danger-bg: #fde7e9;
        --danger-border: #f1bfc5;
      }

      body {
        margin: 0;
        font-family:
          "Segoe UI", "Hiragino Kaku Gothic ProN", Meiryo, sans-serif;

        background: var(--bg);
        color: var(--text);
      }

      .header {
        background: #fff;
        border-bottom: 2px solid #222;
        padding: 14px 24px;
        font-weight: bold;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .header-btn {
        background: var(--blue);
        color: white;
        border: none;
        padding: 8px 16px;
        border-radius: 4px;
        font-size: 14px;
        font-weight: bold;
        cursor: pointer;
        text-decoration: none;
        transition: background 0.2s ease;
      }

      .header-btn:hover {
        background: var(--blue-dark);
      }

      .title {
        font-size: 20px;
        font-weight: bold;
        margin: 16px;
      }

      .container {
        max-width: 1200px;
        margin: 0 auto;
        padding: 20px;
      }

      .master-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
        gap: 20px;
        margin-top: 20px;
      }

      .master-card {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 6px;
        padding: 20px;
        text-align: center;
        transition: all 0.3s ease;
      }

      .master-card:hover {
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        border-color: var(--blue);
      }

      .master-card a {
        display: block;
        padding: 40px 20px;
        text-decoration: none;
        color: var(--text);
      }

      .master-card a:hover {
        color: var(--blue);
      }

      .master-icon {
        font-size: 48px;
        margin-bottom: 16px;
      }

      .master-name {
        font-size: 16px;
        font-weight: 600;
        margin-bottom: 8px;
      }

      .master-description {
        font-size: 13px;
        color: var(--muted);
      }

      .master-btn {
        display: inline-block;
        background: var(--blue);
        color: white;
        padding: 7px 12px;
        border-radius: 4px;
        text-decoration: none;
        font-weight: bold;
        margin-top: 12px;
        cursor: pointer;
        font-size: 13px;
        transition: background 0.2s ease;
        border: 1px solid var(--blue);
      }

      .master-btn:hover {
        background: var(--blue-dark);
        border-color: var(--blue-dark);
      }
    </style>
  </head>
  <body>
    <div class="header">
      <span>マスタ管理</span>
      <a href="business_select.html" class="header-btn">戻る</a>
    </div>

    <div class="container">
      <div class="title">マスタ一覧</div>

      <div class="master-grid">
        <!-- 部署マスタ -->
        <div class="master-card">
          <a href="manage_department_master.html">
            <div class="master-icon">🏢</div>
            <div class="master-name">部署マス</div>
            <div class="master-description">部署情報を管理します</div>
            <div class="master-btn">管理画面へ</div>
          </a>
        </div>

        <!-- 担当者マスタ -->
        <div class="master-card">
          <a href="manage_contact_master.html">
            <div class="master-icon">👤</div>
            <div class="master-name">担当者マスタ</div>
            <div class="master-description">担当者情報を管理します</div>
            <div class="master-btn">管理画面へ</div>
          </a>
        </div>

        <!-- 業務マスタ -->
        <div class="master-card">
          <a href="manage_BusinessLogic_master.html">
            <div class="master-icon">📋</div>
            <div class="master-name">業務マスタ</div>
            <div class="master-description">業務情報を管理します</div>
            <div class="master-btn">管理画面へ</div>
          </a>
        </div>
      </div>
    </div>
  </body>
</html>
<!-- ★マスタ一覧画面★ END -->
