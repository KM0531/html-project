<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <title>データ取込結果確認画面</title>
    <!-- 小林修正★ START -->
    <link rel="icon" href="icons/MHC_favicon.png" />
    <!-- 小林修正★ END -->
    <style>
      body {
        font-family: sans-serif;
        background: #f4f4f4;
        padding: 20px;
      }

      /* ===== 見出しエリア ===== */
      .header {
        display: flex;
        justify-content: space-between;
        align-items: flex-end;
        margin-bottom: 10px;
      }

      /* 見出し */
      .title {
        font-size: 18px;
        font-weight: bold;
      }

      /* ★小林修正★ START */
      /* ===== 再取込ボタン（強調色） ===== */
      /*
      .reimport-btn {
        height: 34px;
        padding: 0 14px;
        cursor: pointer;
        background: #3498db;
        color: #fff;
        border: none;
        border-radius: 4px;
      }

      .reimport-btn:hover {
        background: #2980b9;
      }
      */

      /* ===== 再依頼ボタン（強調色） ===== */
      .rerequest-btn {
        height: 34px;
        padding: 0 14px;
        cursor: pointer;
        background: #3498db;
        color: #fff;
        border: none;
        border-radius: 4px;
      }

      .rerequest-btn:hover {
        background: #2980b9;
      }

      /* ===== ボタンを横並びにする ===== */
      .button-group {
        display: flex;
        gap: 8px; /* ボタン間の間隔 */
      }
      /* ★小林修正★ END */

      /* ===== サマリ ===== */
      .summary {
        display: flex;
        gap: 10px;
      }

      /* ===== テーブル ===== */
      .table {
        background: #fff;
        border: 1px solid #ccc;
      }

      .row {
        display: flex;
        border-bottom: 1px solid #ddd;
      }
      .row:last-child {
        border-bottom: none;
      }

      /* ヘッダー */
      .header-row {
        background: #eaeaea;
        font-weight: bold;
      }

      /* セル */
      .cell {
        padding: 8px;
        border-right: 1px solid #ddd;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .cell:last-child {
        border-right: none;
      }

      /* 列幅 */
      .cell.no {
        width: 50px;
      }
      .cell.name {
        flex: 2;
        justify-content: flex-start;
      }
      .cell.folder {
        flex: 2;
        justify-content: flex-start;
      }
      .cell.month {
        width: 100px;
      }
      .cell.import {
        width: 80px;
      }
      .cell.check {
        width: 80px;
      }

      /* ステータス */
      .ok {
        color: #27ae60;
        font-weight: bold;
      }
      .ng {
        color: #c0392b;
        font-weight: bold;
      }

      /* フォルダリンク */
      .folder a {
        color: #2980b9;
        text-decoration: none;
      }
      .folder a:hover {
        text-decoration: underline;
      }

      /* ===== エラー ===== */
      .error {
        margin-top: 10px;
        padding: 10px;
        background: #ffecec;
        border: 1px solid #e74c3c;
        color: #c0392b;
        display: none;
      }
    </style>
  </head>
  <body>
    <div class="header">
      <div class="title">
        未払修繕費仕訳計上業務&emsp;データ取込結果確認画面
      </div>
      <!-- ★小林修正★ START -->
      <div class="button-group">
        <!-- <button class="reimport-btn" onclick="reImport()">再取込</button> -->
        <button class="rerequest-btn" onclick="reRequest()">再依頼</button>
      </div>
      <!-- ★小林修正★ END -->
    </div>

    <div class="summary">
      <div id="importCount"></div>
    </div>
    <div class="summary">
      <div id="checkCount"></div>
    </div>

    <div class="table" id="table"></div>

    <div class="error" id="errorBox"></div>

    <script>
      // ===== サンプルデータ =====
      const files = [
        {
          no: 1,
          name: "入金突合仕訳明細表.xlsx",
          folder: "/NAS/yyyymm/入金",
          month: "2026/03",
          imported: true,
          checked: true,
        },
        {
          no: 2,
          name: "支払実績明細表.xlsx",
          folder: "/NAS/yyyymm/支払",
          month: "2026/03",
          imported: true,
          checked: true,
        },
        {
          no: 3,
          name: "前月元締後PL.xlsx",
          folder: "/NAS/yyyymm/PL",
          month: "2026/03",
          imported: true,
          checked: true,
        },
        {
          no: 4,
          name: "総勘定元帳.xlsx",
          folder: "/NAS/yyyymm/GL",
          month: "2026/03",
          imported: true,
          checked: false,
        },
      ];
      // ★小林修正★ START
      // ===== 再取込 =====
      /*
      function reImport() {
        alert("再取込処理を実行します（モック）");

        // TODO: SharePoint（ファイルサーバー）からファイル再取得処理を実装
      }
      */

      function reRequest() {
        window.open("sp_file_request_for_ARJ.html", "_blank");
        window.close();
      }
      // ★小林修正★ END

      // ===== 描画 =====
      function render() {
        const total = files.length;
        const imported = files.filter((f) => f.imported).length;
        const checked = files.filter((f) => f.checked).length;

        document.getElementById("importCount").innerText =
          `取込済み：${imported}/${total}`;

        document.getElementById("checkCount").innerText =
          `チェック済み：${checked}/${total}`;

        const table = document.getElementById("table");
        table.innerHTML = "";

        // ヘッダー
        const header = document.createElement("div");
        header.className = "row header-row";
        header.innerHTML = `
    <div class="cell no">NO</div>
    <div class="cell name">ファイル名</div>
    <div class="cell folder">フォルダ</div>
    <div class="cell month">対象月</div>
    <div class="cell import">取込</div>
    <div class="cell check">チェック</div>
  `;
        table.appendChild(header);

        // データ行
        files.forEach((f) => {
          const row = document.createElement("div");
          row.className = "row";

          row.innerHTML = `
      <div class="cell no">${f.no}</div>
      <div class="cell name">${f.name}</div>

      <!-- フォルダをリンク化 -->
      <div class="cell folder">
        <a href="#" onclick="openFolder('${f.folder}')">${f.folder}</a>
      </div>

      <div class="cell month">${f.month}</div>

      <div class="cell import ${f.imported ? "ok" : "ng"}">
        ${f.imported ? "OK" : "NG"}
      </div>

      <div class="cell check ${f.checked ? "ok" : "ng"}">
        ${f.checked ? "OK" : "NG"}
      </div>
    `;

          table.appendChild(row);
        });

        // エラー表示
        const errorBox = document.getElementById("errorBox");
        const errorFile = files.find((f) => !f.checked);

        if (errorFile) {
          errorBox.style.display = "block";
          errorBox.innerText = `No${errorFile.no}でチェックエラーです。（エラー内容：ファイル名が異なります）`;
        } else {
          errorBox.style.display = "none";
        }
      }

      // フォルダリンク押下
      function openFolder(path) {
        alert(path + " を開きます（モック）");

        // TODO: SPOの該当フォルダをブラウザで開く処理
      }

      render();
    </script>
  </body>
</html>
